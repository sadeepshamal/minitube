<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minitube</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            margin: 0;
        }

        h1 {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .toggle-link {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .toggle-link:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .form-container {
            display: none;
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-top: 20px;
            width: 300px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.9rem;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #cccccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 0.95rem;
            background-color: #fafafa;
        }

        input:focus {
            border-color: #3498db;
            outline: none;
            background-color: #fff;
        }

        .note {
            font-size: 0.75rem;
            color: #7f8c8d;
            margin-top: 4px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>Welcome to Minitube</h1>

    <a href="#" class="toggle-link" id="showFormLink">Create an account</a>

    <div class="form-container" id="accountForm">
        <form action="#" method="POST">
            
            <div class="input-group">
                <label for="firstName">First Name</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>

            <div class="input-group">
                <label for="lastName">Last Name</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>

            <div class="input-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" 
                       pattern="^(?=.*[A-Z])(?=.*[!@#$%^&*(),.?\":{}|<>]).{8,}$" 
                       required>
                <div class="note">Must include at least 1 uppercase letter and 1 symbol.</div>
            </div>

            <button type="submit" class="btn-submit">Create an account</button>

        </form>
    </div>

    <script>
        const showFormLink = document.getElementById('showFormLink');
        const accountForm = document.getElementById('accountForm');

        showFormLink.addEventListener('click', function(event) {
            event.preventDefault();
            accountForm.style.display = 'block';
            showFormLink.style.display = 'none';
        });
    </script>

</body>
</html>
